- job:
    name: openstack-helm-images-build-tempest
    parent: openstack-helm-images-build
    description: Build tempest images
    nodeset: openstack-helm-images-ubuntu-noble
    vars: &tempest_vars
      currentdate: "{{ now(utc=True,fmt='%Y%m%d') }}"
      container_images:
        - context: tempest
          registry: quay.io
          repository: quay.io/airshipit/tempest
          container_filename: Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          build_args:
            - "FROM='quay.io/airshipit/ubuntu:noble'"
          tags:
            - latest-ubuntu_noble
            - "ubuntu_noble-{{ currentdate }}"
    files: &tempest_files
      - tempest/.*
      - zuul.d/tempest.yaml
      - roles/.*
      - playbooks/.*

- job:
    name: openstack-helm-images-upload-tempest
    parent: openstack-helm-images-upload
    description: Build and upload tempest images
    dependencies:
      - name: openstack-helm-images-buildset-registry
      - name: openstack-helm-images-build-tempest
    vars: *tempest_vars
    files: *tempest_files

- job:
    name: openstack-helm-images-promote-tempest
    parent: openstack-helm-images-promote
    description: Promote a previously published tempest image to latest.
    vars: *tempest_vars
    files: *tempest_files
