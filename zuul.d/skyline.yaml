- job:
    name: openstack-helm-images-build-skyline
    parent: openstack-helm-images-build
    description: Build skyline images
    nodeset: openstack-helm-images-ubuntu-noble
    dependencies:
      - name: openstack-helm-images-buildset-registry
      - name: openstack-helm-images-build-base
        soft: true
      - name: openstack-helm-images-build-venv-builder
        soft: true
    vars: &skyline_vars
      currentdate: "{{ now(utc=True,fmt='%Y%m%d') }}"
      container_images:
        - context: .
          registry: quay.io
          repository: quay.io/airshipit/skyline
          container_filename: skyline/Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "2024.2-ubuntu_jammy"
            - "2024.2-ubuntu_jammy-{{ currentdate }}"
          build_args:
            - "BASE_VENV_BUILDER=quay.io/airshipit/venv_builder:2024.2-ubuntu_jammy"
            - "BASE_RUNTIME=quay.io/airshipit/base:2024.2-ubuntu_jammy"
            - "PROJECT_REF=stable/2024.2"
        - context: .
          registry: quay.io
          repository: quay.io/airshipit/skyline
          container_filename: skyline/Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "2025.1-ubuntu_noble"
            - "2025.1-ubuntu_noble-{{ currentdate }}"
          build_args:
            - "BASE_VENV_BUILDER=quay.io/airshipit/venv_builder:2025.1-ubuntu_noble"
            - "BASE_RUNTIME=quay.io/airshipit/base:2025.1-ubuntu_noble"
            - "PROJECT_REF=stable/2025.1"
        - context: .
          registry: quay.io
          repository: quay.io/airshipit/skyline
          container_filename: skyline/Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "2025.2-ubuntu_noble"
            - "2025.2-ubuntu_noble-{{ currentdate }}"
          build_args:
            - "BASE_VENV_BUILDER=quay.io/airshipit/venv_builder:2025.2-ubuntu_noble"
            - "BASE_RUNTIME=quay.io/airshipit/base:2025.2-ubuntu_noble"
            - "PROJECT_REF=stable/2025.2"
    files: &skyline_files
      - skyline/.*
      - zuul.d/skyline.yaml
      - roles/.*
      - playbooks/.*

- job:
    name: openstack-helm-images-upload-skyline
    parent: openstack-helm-images-upload
    description: Build and upload skyline images
    dependencies:
      - name: openstack-helm-images-buildset-registry
      - name: openstack-helm-images-build-skyline
    vars: *skyline_vars
    files: *skyline_files

- job:
    name: openstack-helm-images-promote-skyline
    parent: openstack-helm-images-promote
    description: Promote a previously published skyline image to latest.
    vars: *skyline_vars
    files: *skyline_files
