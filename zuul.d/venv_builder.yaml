- job:
    name: openstack-helm-images-build-venv-builder
    parent: openstack-helm-images-build
    vars: &venv_builder_vars
      set_base_registry_prefix: true
      currentdate: "{{ now(utc=True,fmt='%Y%m%d') }}"
      container_images:
        - context: .
          registry: quay.io
          repository: quay.io/airshipit/venv_builder
          container_filename: venv_builder/Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "2024.2-ubuntu_jammy"
            - "2024.2-ubuntu_jammy-{{ currentdate }}"
          build_args:
            - "FROM='public.ecr.aws/ubuntu/ubuntu:jammy'"
            - "REQUIREMENTS_REF=stable/2024.2"
        - context: .
          registry: quay.io
          repository: quay.io/airshipit/venv_builder
          container_filename: venv_builder/Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "2025.1-ubuntu_noble"
            - "2025.1-ubuntu_noble-{{ currentdate }}"
          build_args:
            - "FROM='public.ecr.aws/ubuntu/ubuntu:noble'"
            - "REQUIREMENTS_REF=stable/2025.1"
        - context: .
          registry: quay.io
          repository: quay.io/airshipit/venv_builder
          container_filename: venv_builder/Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "2025.2-ubuntu_noble"
            - "2025.2-ubuntu_noble-{{ currentdate }}"
          build_args:
            - "FROM='public.ecr.aws/ubuntu/ubuntu:noble'"
            - "REQUIREMENTS_REF=stable/2025.2"

- job:
    name: openstack-helm-images-upload-venv-builder
    parent: openstack-helm-images-upload
    description: Build and upload venv builder images
    dependencies:
      - name: openstack-helm-images-buildset-registry
      - name: openstack-helm-images-build-venv-builder
    vars: *venv_builder_vars

- job:
    name: openstack-helm-images-promote-venv-builder
    parent: openstack-helm-images-promote
    description: Promote a previously published venv builder image to latest.
    vars: *venv_builder_vars
