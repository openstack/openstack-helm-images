- job:
    name: openstack-helm-images-build-octavia
    parent: openstack-helm-images-build
    description: Build octavia images
    nodeset: openstack-helm-images-ubuntu-noble
    dependencies:
      - name: openstack-helm-images-buildset-registry
      - name: openstack-helm-images-build-base
        soft: true
      - name: openstack-helm-images-build-venv-builder
        soft: true
    vars: &octavia_vars
      currentdate: "{{ now(utc=True,fmt='%Y%m%d') }}"
      container_images:
        - context: .
          registry: quay.io
          repository: quay.io/airshipit/octavia
          container_filename: octavia/Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "2025.1-ubuntu_noble"
            - "2025.1-ubuntu_noble-{{ currentdate }}"
          build_args:
            - "BASE_VENV_BUILDER=quay.io/airshipit/venv_builder:2025.1-ubuntu_noble"
            - "BASE_RUNTIME=quay.io/airshipit/base:2025.1-ubuntu_noble"
            - "PROJECT_REF=stable/2025.1"
        - context: .
          registry: quay.io
          repository: quay.io/airshipit/octavia
          container_filename: octavia/Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "2025.2-ubuntu_noble"
            - "2025.2-ubuntu_noble-{{ currentdate }}"
          build_args:
            - "BASE_VENV_BUILDER=quay.io/airshipit/venv_builder:2025.2-ubuntu_noble"
            - "BASE_RUNTIME=quay.io/airshipit/base:2025.2-ubuntu_noble"
            - "PROJECT_REF=stable/2025.2"
        - context: .
          registry: quay.io
          repository: quay.io/airshipit/octavia
          container_filename: octavia/Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "2026.1-ubuntu_noble"
            - "2026.1-ubuntu_noble-{{ currentdate }}"
          build_args:
            - "BASE_VENV_BUILDER=quay.io/airshipit/venv_builder:2026.1-ubuntu_noble"
            - "BASE_RUNTIME=quay.io/airshipit/base:2026.1-ubuntu_noble"
            - "PROJECT_REF=stable/2026.1"
    files: &octavia_files
      - octavia/.*
      - zuul.d/octavia.yaml
      - roles/.*
      - playbooks/.*

- job:
    name: openstack-helm-images-upload-octavia
    parent: openstack-helm-images-upload
    description: Build and upload octavia images
    dependencies:
      - name: openstack-helm-images-buildset-registry
      - name: openstack-helm-images-build-octavia
    vars: *octavia_vars
    files: *octavia_files

- job:
    name: openstack-helm-images-promote-octavia
    parent: openstack-helm-images-promote
    description: Promote a previously published octavia image to latest.
    vars: *octavia_vars
    files: *octavia_files
