- job:
    name: openstack-helm-images-build-libvirt
    parent: openstack-helm-images-build
    description: Build libvirt images
    nodeset: openstack-helm-images-ubuntu-noble
    vars: &libvirt_vars
      currentdate: "{{ now(utc=True,fmt='%Y%m%d') }}"
      container_images:
        - context: libvirt
          registry: quay.io
          repository: quay.io/airshipit/libvirt
          container_filename: Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "epoxy-ubuntu_noble-{{ currentdate }}"
            - "epoxy-ubuntu_noble"
            - "2025.1-ubuntu_noble-{{ currentdate }}"
            - "2025.1-ubuntu_noble"
          build_args:
            - FROM=quay.io/airshipit/ubuntu:noble
            - RELEASE=epoxy
        - context: libvirt
          registry: quay.io
          repository: quay.io/airshipit/libvirt
          container_filename: Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "flamingo-ubuntu_noble-{{ currentdate }}"
            - "flamingo-ubuntu_noble"
            - "2025.2-ubuntu_noble-{{ currentdate }}"
            - "2025.2-ubuntu_noble"
          build_args:
            - FROM=quay.io/airshipit/ubuntu:noble
            - RELEASE=flamingo
        - context: libvirt
          registry: quay.io
          repository: quay.io/airshipit/libvirt
          container_filename: Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "gazpacho-ubuntu_noble-{{ currentdate }}"
            - "gazpacho-ubuntu_noble"
            - "2026.1-ubuntu_noble-{{ currentdate }}"
            - "2026.1-ubuntu_noble"
          build_args:
            - FROM=quay.io/airshipit/ubuntu:noble
            - RELEASE=gazpacho
    files: &libvirt_files
      - libvirt/.*
      - zuul.d/libvirt.yaml
      - roles/.*
      - playbooks/.*

- job:
    name: openstack-helm-images-upload-libvirt
    parent: openstack-helm-images-upload
    description: Build and upload libvirt images
    dependencies:
      - name: openstack-helm-images-buildset-registry
      - name: openstack-helm-images-build-libvirt
    vars: *libvirt_vars
    files: *libvirt_files

- job:
    name: openstack-helm-images-promote-libvirt
    parent: openstack-helm-images-promote
    description: Promote a previously published libvirt image to latest.
    vars: *libvirt_vars
    files: *libvirt_files
