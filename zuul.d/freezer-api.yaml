- job:
    name: openstack-helm-images-build-freezer-api
    parent: openstack-helm-images-build
    description: Build freezer-api images
    nodeset: openstack-helm-images-ubuntu-noble
    dependencies:
      - name: openstack-helm-images-buildset-registry
      - name: openstack-helm-images-build-base
        soft: true
      - name: openstack-helm-images-build-venv-builder
        soft: true
    vars: &freezer_api_vars
      currentdate: "{{ now(utc=True,fmt='%Y%m%d') }}"
      container_images:
        - context: .
          registry: quay.io
          repository: quay.io/airshipit/freezer-api
          container_filename: freezer-api/Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "2025.1-ubuntu_noble"
            - "2025.1-ubuntu_noble-{{ currentdate }}"
          build_args:
            - "BASE_VENV_BUILDER=quay.io/airshipit/venv_builder:2025.1-ubuntu_noble"
            - "BASE_RUNTIME=quay.io/airshipit/base:2025.1-ubuntu_noble"
            - "PROJECT_REF=stable/2025.1"
        - context: .
          registry: quay.io
          repository: quay.io/airshipit/freezer-api
          container_filename: freezer-api/Dockerfile
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - "2025.2-ubuntu_noble"
            - "2025.2-ubuntu_noble-{{ currentdate }}"
          build_args:
            - "BASE_VENV_BUILDER=quay.io/airshipit/venv_builder:2025.2-ubuntu_noble"
            - "BASE_RUNTIME=quay.io/airshipit/base:2025.2-ubuntu_noble"
            - "PROJECT_REF=stable/2025.2"
    files: &freezer_api_files
      - freezer-api/.*
      - zuul.d/freezer-api.yaml
      - roles/.*
      - playbooks/.*

- job:
    name: openstack-helm-images-upload-freezer-api
    parent: openstack-helm-images-upload
    description: Build and upload freezer-api images
    dependencies:
      - name: openstack-helm-images-buildset-registry
      - name: openstack-helm-images-build-freezer-api
    vars: *freezer_api_vars
    files: *freezer_api_files

- job:
    name: openstack-helm-images-promote-freezer-api
    parent: openstack-helm-images-promote
    description: Promote a previously published freezer-api image to latest.
    vars: *freezer_api_vars
    files: *freezer_api_files
